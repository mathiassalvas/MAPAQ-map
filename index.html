<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Infractions MAPAQ – Québec</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
body { margin:0; font-family: Arial; }

.header {
  position:absolute;
  top:0;
  width:100%;
  background:white;
  padding:10px;
  z-index:1000;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
  display:flex;
  justify-content:center;
  gap:10px;
}

.header input, .header select {
  padding:6px;
  font-size:14px;
}

#map {
  height: calc(100vh - 90px);
  margin-top:50px;
}

.popup-content {
  max-height:200px;
  overflow-y:auto;
  font-size:13px;
}
.popup-title {
  font-weight:bold;
  font-size:15px;
}

.footer {
  height:40px;
  background:#f5f5f5;
  border-top:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  color:#555;
}
.footer a {
  color:#0077cc;
  text-decoration:none;
}

.nav {
  position:absolute;
  bottom:60px;
  right:20px;
  z-index:1000;
}
.compass {
  position:relative;
  width:90px;
  height:90px;
}
.compass button {
  position:absolute;
  width:35px;
  height:35px;
  border:none;
  border-radius:50%;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}
.up { top:0; left:27px; }
.down { bottom:0; left:27px; }
.left { left:0; top:27px; }
.right { right:0; top:27px; }
</style>
</head>

<body>

<div class="header">
  <input id="search" placeholder="Rechercher restaurant..." />
  <select id="filter"></select>

  <select id="statusFilter">
    <option value="">Tous les établissements</option>
    <option value="active">🟢 Toujours en activité</option>
    <option value="closed">🔴 Fermé</option>
  </select>

  <button onclick="resetView()">Réinitialiser</button>
</div>

<div class="nav">
  <div class="compass">
    <button class="up" onclick="map.panBy([0,-150])">↑</button>
    <button class="left" onclick="map.panBy([-150,0])">←</button>
    <button class="right" onclick="map.panBy([150,0])">→</button>
    <button class="down" onclick="map.panBy([0,150])">↓</button>
  </div>
</div>

<div id="map"></div>

<div class="footer">
  Réalisé par <strong>&nbsp;Mathias Salvas</strong>, 1er avril 2026 —
  <a href="https://www.donneesquebec.ca/recherche/dataset/condamnations-des-etablissements-alimentaires-et-condamnations-concernant-le-bien-etre-des-anim/resource/40105615-3abf-414b-bcba-182e8f2c5eb2" target="_blank">
    &nbsp;Infractions MAPAQ
  </a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
const map = L.map("map").setView([52, -71], 6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

const markers = L.markerClusterGroup({
  disableClusteringAtZoom: 14,
  maxClusterRadius: 40
});
map.addLayer(markers);

let allData = [];

/* ✅ STATUT CORRIGÉ */
function isClosed(row){
  const info = (row.Information_etablissement || "").toLowerCase();
  return info.includes("cessé ses opérations");
}

/* FILTER GLOBAL */
function applyFilters(){
  const search = document.getElementById("search").value.toLowerCase();
  const type = document.getElementById("filter").value;
  const status = document.getElementById("statusFilter").value;

  let filtered = allData;

  if(search){
    filtered = filtered.filter(r =>
      (r.Raison_sociale || "").toLowerCase().includes(search) ||
      (r.Adresse_lieu_infraction || "").toLowerCase().includes(search)
    );
  }

  if(type){
    filtered = filtered.filter(r =>
      (r.SOC_NOM_ARTCL_INFRC || "").includes(type)
    );
  }

  if(status === "active"){
    filtered = filtered.filter(r => !isClosed(r));
  }

  if(status === "closed"){
    filtered = filtered.filter(r => isClosed(r));
  }

  displayData(filtered);
}

/* DISPLAY */
function displayData(data){
  markers.clearLayers();

  data.forEach(row=>{
    const lat = parseFloat(row.Latitude);
    const lon = parseFloat(row.Longitude);

    if(!isNaN(lat) && !isNaN(lon)){

      const googleQuery = encodeURIComponent(
        row.Raison_sociale + " " + row.Adresse_lieu_infraction
      );

      const closed = isClosed(row);
      const status = closed ? "🔴 Fermé" : "🟢 Actif";

      const marker = L.marker([lat,lon]);

      marker.bindPopup(`
        <div class="popup-title">${row.Raison_sociale}</div>
        <div class="popup-content">

          <strong>Statut:</strong> ${status}<br><br>

          <strong>Adresse:</strong><br>
          ${row.Adresse_lieu_infraction}<br><br>

          <strong>Catégorie:</strong><br>
          ${row.SOC_NOM_ARTCL_INFRC}<br><br>

          <strong>Infraction:</strong><br>
          ${row.Description_infraction}<br><br>

          <strong>Date:</strong> ${row.Date_infraction}<br>
          <strong>Amende:</strong> ${row.Amende}<br><br>

          <a href="https://www.google.com/search?q=${googleQuery}" target="_blank">
            🔍 Voir établissement
          </a>
        </div>
      `);

      markers.addLayer(marker);
    }
  });
}

/* EVENTS */
document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("filter").addEventListener("change", applyFilters);
document.getElementById("statusFilter").addEventListener("change", applyFilters);

/* RESET */
function resetView(){
  document.getElementById("search").value = "";
  document.getElementById("filter").value = "";
  document.getElementById("statusFilter").value = "";
  displayData(allData);
  map.setView([52,-71],6);
}

/* LOAD CSV */
Papa.parse("listecondamnation_geocoded.csv", {
  download:true,
  header:true,
  complete: function(results){

    allData = results.data;

    const counts = {};
    allData.forEach(r=>{
      if(!r.SOC_NOM_ARTCL_INFRC) return;
      const key = r.SOC_NOM_ARTCL_INFRC.trim();
      counts[key] = (counts[key] || 0) + 1;
    });

    const sorted = Object.entries(counts)
      .sort((a,b)=>b[1]-a[1]);

    const select = document.getElementById("filter");
    select.innerHTML = `<option value="">Toutes les infractions</option>`;

    sorted.forEach(([type,count])=>{
      const opt = document.createElement("option");
      opt.value = type;
      opt.textContent = `${type} (x${count})`;
      select.appendChild(opt);
    });

    displayData(allData);
  }
});

/* ZOOM */
function updateZoom(){
  document.getElementById("zoom-level").innerText =
    "Zoom: " + map.getZoom();
}
map.on("zoomend", updateZoom);
</script>

<div id="zoom-level" style="
  position:absolute;
  bottom:160px;
  right:20px;
  background:white;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
">
</div>

</body>
</html>
